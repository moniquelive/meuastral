[tools]
node = "20"
"npm:elm" = "0.19.1-6"
"npm:elm-test" = "0.19.1-revision17"
"npm:wrangler" = "4.80.0"

[env]
TZ = "America/Sao_Paulo"

[tasks.install]
description = "Install Node.js dependencies"
run = "npm ci --prefer-offline --no-audit --fund=false"

[tasks.build]
description = "Build the production Elm app"
depends = ["install"]
run = "npm run build"

[tasks.dev]
description = "Run the local Cloudflare Worker development server"
depends = ["install"]
run = "npm run start"

[tasks.test]
description = "Run Elm tests"
depends = ["install"]
run = "npm test"

[tasks.ci]
description = "Run tests and production build"
depends = ["test", "build"]

[shell_alias]
w = "mise x node@latest -- npx wrangler"
