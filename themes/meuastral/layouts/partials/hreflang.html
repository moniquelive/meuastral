{{- $currentLang := .Site.Language.Params.locale | default .Site.Language.Locale -}}
<link rel="alternate" hreflang="{{ $currentLang }}" href="{{ .Permalink }}">
{{- range .Translations }}
<link rel="alternate" hreflang="{{ .Site.Language.Params.locale | default .Site.Language.Locale }}" href="{{ .Permalink }}">
{{- end }}
{{- if .IsHome }}
<link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}">
{{- end }}
